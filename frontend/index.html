<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Recommendation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">
        <header>
            <h1>Job Recommendation System</h1>
            <p class="subtitle">Find the perfect role based on your skills and location.</p>
        </header>

        <div class="form-box">
            <input type="text" id="skills" placeholder="Enter skills ">
            <input type="text" id="location" placeholder="Enter location ">
            <input type="text" id="level" placeholder="Enter seniority level ">

            <button onclick="getRecommendations()">Get Recommendations</button>
        </div>

        <div class="results-section">
            <div id="results"></div>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
